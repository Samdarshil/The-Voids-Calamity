<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <!-- ===================== BACKGROUND ===================== -->
  <rect x="0" y="0" width="1200" height="900" fill="#f2efe9"/>

  <!-- ===================== TITLE BLOCK ===================== -->
  <rect x="0" y="0" width="1200" height="64" fill="#e3ddd0"/>
  <text x="30" y="28" font-size="20" font-weight="bold" fill="#3a3226">VOID: THE UNSEEN HAND — METRO ARCHIVES</text>
  <text x="30" y="50" font-size="13" fill="#6b6252">Public Floor Plan + Vertical Level Stack — Top-Down Design Blueprint — NOT surveyed engineering geometry</text>
  <text x="1000" y="28" font-size="12" fill="#6b6252">Location 03 of 5</text>
  <text x="1000" y="46" font-size="12" fill="#6b6252">Phase 1 — Rev. 1.0</text>

  <!-- ===================== MAIN SCHEMATIC FRAME ===================== -->
  <rect x="30" y="84" width="890" height="770" fill="#fdfcf9" stroke="#c9bfa9" stroke-width="2" rx="6"/>

  <!-- Section divider label -->
  <text x="55" y="112" font-size="13" font-weight="bold" fill="#4a4230">PUBLIC FLOOR — TOP-DOWN PLAN</text>
  <line x1="660" y1="105" x2="660" y2="765" stroke="#c9bfa9" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="675" y="112" font-size="13" font-weight="bold" fill="#4a4230">VERTICAL LEVEL STACK</text>

  <!-- ===================== COMPASS / SEAM ORIENTATION ===================== -->
  <g transform="translate(120,195)">
    <circle cx="0" cy="0" r="36" fill="#ffffff" stroke="#b7ac93" stroke-width="1.5"/>
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#b7ac93" stroke-width="1"/>
    <path d="M0,-28 L-6,-17 L6,-17 Z" fill="#3a3226"/>
    <text x="0" y="-38" font-size="8" font-weight="bold" fill="#3a3226" text-anchor="middle">TOWARD SPIRE</text>
    <text x="0" y="45" font-size="8" font-weight="bold" fill="#7a5a2e" text-anchor="middle">TOWARD UNDERCROFT</text>
    <text x="0" y="55" font-size="8" font-weight="bold" fill="#7a5a2e" text-anchor="middle">(old subway seam)</text>
  </g>
  <text x="60" y="270" font-size="9" font-style="italic" fill="#8a8066">Seam position — see</text>
  <text x="60" y="282" font-size="9" font-style="italic" fill="#8a8066">Metro_Archives.md Sec. 3.2</text>

  <!-- ===================== EXHIBIT HALL ===================== -->
  <rect x="180" y="280" width="180" height="150" fill="#eee7d6" stroke="#a99b74" stroke-width="2" rx="4"/>
  <text x="195" y="308" font-size="13" font-weight="bold" fill="#4a3f22">Exhibit Hall</text>
  <text x="195" y="325" font-size="10" fill="#6b5e3d">General public displays</text>
  <text x="195" y="340" font-size="10" fill="#6b5e3d">Ambient storytelling only</text>

  <!-- ===================== EAST WING — SEALED EXHIBIT CASE ===================== -->
  <rect x="380" y="280" width="150" height="150" fill="#f5ecd6" stroke="#c9963f" stroke-width="3" stroke-dasharray="6,4" rx="4"/>
  <text x="393" y="306" font-size="12" font-weight="bold" fill="#7a4e10">East Wing</text>
  <text x="393" y="322" font-size="11" font-weight="bold" fill="#7a4e10">Sealed Exhibit Case</text>
  <text x="393" y="340" font-size="9" fill="#8a5c14">Lockpick-gated</text>
  <text x="393" y="353" font-size="9" fill="#8a5c14">Pre-Council subway map</text>
  <text x="393" y="366" font-size="9" fill="#8a5c14">→ bridges to Contract 3</text>
  <!-- lock icon -->
  <circle cx="505" cy="295" r="10" fill="#c9963f"/>
  <text x="505" y="300" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">🔒</text>

  <!-- ===================== HISTORICAL SOCIETY OFFICE ===================== -->
  <rect x="90" y="460" width="90" height="180" fill="#e6ede0" stroke="#7d9868" stroke-width="2" rx="4"/>
  <text x="100" y="486" font-size="12" font-weight="bold" fill="#31461f">Historical</text>
  <text x="100" y="500" font-size="12" font-weight="bold" fill="#31461f">Society</text>
  <text x="100" y="514" font-size="12" font-weight="bold" fill="#31461f">Office</text>
  <text x="100" y="534" font-size="9" fill="#4f6a3a">SQ1 unlock +</text>
  <text x="100" y="546" font-size="9" fill="#4f6a3a">delivery point</text>

  <!-- ===================== RECEPTION & READING ROOM ===================== -->
  <rect x="190" y="460" width="340" height="180" fill="#f2efe6" stroke="#a99b74" stroke-width="2" rx="4"/>
  <text x="210" y="495" font-size="15" font-weight="bold" fill="#4a3f22">Reception &amp;</text>
  <text x="210" y="516" font-size="15" font-weight="bold" fill="#4a3f22">Reading Room</text>
  <text x="210" y="538" font-size="10" fill="#6b5e3d">Retired Archives Clerk</text>
  <text x="210" y="552" font-size="10" fill="#6b5e3d">Light social stealth — low density</text>

  <!-- stairs down marker -->
  <rect x="450" y="580" width="60" height="45" fill="#d8cfb6" stroke="#8a7a52" stroke-width="1.5" rx="3"/>
  <text x="458" y="598" font-size="9" font-weight="bold" fill="#4a3f22">STAIRS</text>
  <text x="458" y="611" font-size="9" font-weight="bold" fill="#4a3f22">DOWN ↓</text>
  <path d="M 510 602 L 660 340" fill="none" stroke="#8a7a52" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowBrown)"/>

  <!-- ===================== MAIN ENTRANCE ===================== -->
  <rect x="250" y="670" width="220" height="70" fill="#e9e3d2" stroke="#a99b74" stroke-width="2" rx="4"/>
  <text x="265" y="700" font-size="13" font-weight="bold" fill="#4a3f22">Main Entrance</text>
  <text x="265" y="716" font-size="9" fill="#6b5e3d">Fully public — street-level approach</text>

  <!-- ===================== ARROW MARKERS ===================== -->
  <defs>
    <marker id="arrowBrown" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a7a52"/>
    </marker>
    <marker id="arrowDown1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6f8faa"/>
    </marker>
    <marker id="arrowDown2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c9963f"/>
    </marker>
    <marker id="arrowDown3" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4e6b8f"/>
    </marker>
  </defs>

  <!-- ===================== VERTICAL LEVEL STACK (RIGHT SIDE) ===================== -->

  <!-- Level 1: Public Floor -->
  <rect x="690" y="150" width="200" height="80" fill="#f2efe6" stroke="#a99b74" stroke-width="2" rx="4"/>
  <text x="702" y="175" font-size="12" font-weight="bold" fill="#4a3f22">LEVEL 1 — Public Floor</text>
  <text x="702" y="192" font-size="9" fill="#6b5e3d">Reading Room, Exhibit Hall,</text>
  <text x="702" y="205" font-size="9" fill="#6b5e3d">East Wing, Historical Society Office</text>
  <line x1="790" y1="230" x2="790" y2="255" stroke="#6f8faa" stroke-width="2.5" marker-end="url(#arrowDown1)"/>

  <!-- Level 2: Records Stacks (Tier 1 Reset) -->
  <rect x="690" y="260" width="200" height="90" fill="#e4edf3" stroke="#6f8faa" stroke-width="2" rx="4"/>
  <text x="702" y="285" font-size="12" font-weight="bold" fill="#1f3d52">LEVEL 2 — Records Stacks</text>
  <text x="702" y="302" font-size="9" fill="#3f6280">Reset Tier 1 — Ambient</text>
  <text x="702" y="315" font-size="9" fill="#3f6280">Contract 2 critical path begins</text>
  <text x="702" y="330" font-size="9" fill="#3f6280">Occasional, easily-missed resets</text>
  <line x1="790" y1="350" x2="790" y2="375" stroke="#c9963f" stroke-width="2.5" marker-end="url(#arrowDown2)"/>

  <!-- Level 3: Restricted Archive (Tier 2-3 Reset) -->
  <rect x="690" y="380" width="200" height="110" fill="#f5e9d6" stroke="#c9963f" stroke-width="3" stroke-dasharray="6,4" rx="4"/>
  <text x="702" y="400" font-size="12" font-weight="bold" fill="#7a4e10">LEVEL 2b</text>
  <text x="702" y="415" font-size="12" font-weight="bold" fill="#7a4e10">Restricted Archive</text>
  <text x="702" y="431" font-size="9" fill="#8a5c14">Reset Tier 2 (active) → Tier 3 (aggressive)</text>
  <text x="702" y="444" font-size="9" fill="#8a5c14">Purge Protocol 7 log recovered here</text>
  <text x="702" y="457" font-size="9" fill="#8a5c14">Zero mandatory combat — puzzle tension only</text>
  <circle cx="862" cy="398" r="9" fill="#c9963f"/>
  <text x="862" y="402" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text>
  <line x1="790" y1="490" x2="790" y2="515" stroke="#4e6b8f" stroke-width="2.5" marker-end="url(#arrowDown3)"/>

  <!-- Level 4: Sub-basement -->
  <rect x="690" y="520" width="200" height="110" fill="#dde3ec" stroke="#4e6b8f" stroke-width="2" rx="4"/>
  <text x="702" y="545" font-size="12" font-weight="bold" fill="#1f2f47">LEVEL 3 — Sub-Basement</text>
  <text x="702" y="562" font-size="9" fill="#3a4f6e">Dormant early-ORACLE server node</text>
  <text x="702" y="575" font-size="9" fill="#3a4f6e">OLD NED terminal (Easter Egg 3)</text>
  <text x="702" y="588" font-size="9" fill="#3a4f6e">Echo Shift required</text>
  <text x="702" y="603" font-size="9" fill="#3a4f6e">Physical seam → old subway network</text>
  <circle cx="705" cy="628" r="6" fill="#7ab0c7"/>
  <text x="718" y="632" font-size="9" fill="#3a4f6e">Echo Shift gate</text>

  <!-- Old subway connection out -->
  <path d="M 730 630 C 715 645, 715 655, 730 665"
        fill="none" stroke="#7a5a2e" stroke-width="2.5" stroke-dasharray="7,5"/>
  <text x="702" y="682" font-size="10" font-weight="bold" fill="#7a5a2e">→ Old Pre-Council Subway</text>
  <text x="702" y="696" font-size="10" font-weight="bold" fill="#7a5a2e">→ Undercroft → Sector 0</text>

  <!-- ===================== LEGEND PANEL ===================== -->
  <rect x="940" y="84" width="230" height="700" fill="#fdfcf9" stroke="#c9bfa9" stroke-width="2" rx="6"/>
  <text x="958" y="112" font-size="14" font-weight="bold" fill="#3a3226">LEGEND</text>

  <rect x="958" y="128" width="18" height="14" fill="#f2efe6" stroke="#a99b74" stroke-width="1.5"/>
  <text x="984" y="140" font-size="10" fill="#3a3226">Public floor space</text>

  <rect x="958" y="152" width="18" height="14" fill="#e6ede0" stroke="#7d9868" stroke-width="1.5"/>
  <text x="984" y="164" font-size="10" fill="#3a3226">Quest-critical NPC hub</text>

  <rect x="958" y="176" width="18" height="14" fill="#f5e9d6" stroke="#c9963f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="984" y="188" font-size="10" fill="#3a3226">High-security / restricted</text>

  <rect x="958" y="200" width="18" height="14" fill="#e4edf3" stroke="#6f8faa" stroke-width="1.5"/>
  <text x="984" y="212" font-size="10" fill="#3a3226">Reset Tier 1 (ambient)</text>

  <rect x="958" y="224" width="18" height="14" fill="#dde3ec" stroke="#4e6b8f" stroke-width="1.5"/>
  <text x="984" y="236" font-size="10" fill="#3a3226">Sub-basement / gated</text>

  <circle cx="967" cy="258" r="7" fill="#c9963f"/>
  <text x="967" y="263" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">!</text>
  <text x="984" y="262" font-size="10" fill="#3a3226">Key discovery (Purge log)</text>

  <circle cx="967" cy="282" r="6" fill="#7ab0c7"/>
  <text x="984" y="286" font-size="10" fill="#3a3226">Echo Shift access gate</text>

  <line x1="958" y1="304" x2="976" y2="304" stroke="#8a7a52" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="984" y="308" font-size="10" fill="#3a3226">Vertical circulation (stairs)</text>

  <line x1="958" y1="326" x2="976" y2="326" stroke="#7a5a2e" stroke-width="2.5" stroke-dasharray="7,5"/>
  <text x="984" y="330" font-size="10" fill="#3a3226">Old subway seam connection</text>

  <text x="958" y="362" font-size="11" font-weight="bold" fill="#3a3226">RESET TIER KEY</text>
  <text x="958" y="382" font-size="9" fill="#4a4230">Tier 1 — Ambient (blue)</text>
  <text x="958" y="396" font-size="9" fill="#4a4230">Tier 2/3 — Active/Aggressive (amber)</text>
  <text x="958" y="410" font-size="9" fill="#4a4230">See Metro_Archives.md Sec. 9</text>

  <text x="958" y="446" font-size="11" font-weight="bold" fill="#3a3226">NOTES</text>
  <text x="958" y="466" font-size="9" fill="#4a4230">This is a design schematic for</text>
  <text x="958" y="480" font-size="9" fill="#4a4230">greybox reference. No literal</text>
  <text x="958" y="494" font-size="9" fill="#4a4230">coordinates or engineering</text>
  <text x="958" y="508" font-size="9" fill="#4a4230">geometry are implied. Right-side</text>
  <text x="958" y="522" font-size="9" fill="#4a4230">stack is a schematic cross-section,</text>
  <text x="958" y="536" font-size="9" fill="#4a4230">not a literal elevation drawing.</text>

  <text x="958" y="568" font-size="11" font-weight="bold" fill="#3a3226">COMBAT POLICY</text>
  <text x="958" y="588" font-size="9" fill="#4a4230">Zero mandatory combat encounters</text>
  <text x="958" y="602" font-size="9" fill="#4a4230">in this entire district — see</text>
  <text x="958" y="616" font-size="9" fill="#4a4230">Metro_Archives.md Sec. 23.</text>

  <!-- ===================== FOOTER ===================== -->
  <text x="30" y="875" font-size="10" fill="#6b6252">VOID: The Unseen Hand — Design Studio — Metro Archives Schematic — Companion to Metro_Archives.md</text>
  <text x="900" y="875" font-size="10" fill="#6b6252" text-anchor="end">Rev 1.0</text>

</svg>
